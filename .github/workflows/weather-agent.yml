name: Weather Agent

on:
  schedule:
    - cron: '0 7,12,17,22 * * *'
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weather script
        run: python weather.py

      - name: Commit updated data   
        run: |    
          git config user.name "Weather Agent"
          git config user.email "actions@github.com"
          git add historical_weather.csv forecast_weather.csv daily_log.csv
          git commit -m "Update weather data $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push

# What is the current temperature at this location?
def get_current_weather(lat, lon):
    url = "https://api.open-meteo.com/v1/forecast"
    params = {
        "latitude": lat,
        "longitude": lon,
        "current": "temperature_2m",
        "timezone": "America/Los_Angeles"
    }
    response = requests.get(url, params=params)
    return response.json()

current_data = get_current_weather(LATITUDE, LONGITUDE)
current_temp = current_data["current"]["temperature_2m"]
current_time = current_data["current"]["time"]

log_df = pd.DataFrame({                 # --- just added
